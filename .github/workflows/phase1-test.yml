name: Phase 1 - Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend Tests
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm test

      - name: Frontend Tests
        working-directory: frontend
        run: |
          npm ci
          # npm test
